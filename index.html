<!doctype html>

  <head>

    <link rel="stylesheet" href="./src/output.css" />

    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link

      <section class="grid grid-cols-3 gap-x-8 max-w-4xl mx-auto">
        <section>
          <section class="h-96">
            <img
              src="./image/travel-1.jpg"
              alt=""
              class="h-full w-full rounded-lg object-cover"
            />
          </section>
          <h3 class="mt-5 text-center font-semibold text-lg">
            Enjoy the great cold
          </h3>
          <span class="block text-center mt-2 text-gray-400 text-sm"
            >6,789 properties</span
          >
        </section>
        <section>
          <section class="h-96">
            <img
              src="./image/travel-2.jpg"
              alt=""
              class="h-full w-full rounded-lg object-cover"
            />
          </section>
          <h3 class="mt-5 text-center font-semibold text-lg">
            Enjoy the great cold
          </h3>
          <span class="block text-center mt-2 text-gray-400 text-sm"

        <section>
          <section class="h-96">
            <img
              src="./image/travel-3.jpg"
              alt=""
              class="h-full w-full rounded-lg object-cover"
            />
          </section>
          <h3 class="mt-5 text-center font-semibold text-lg">
            Enjoy the great cold
          </h3>
          <span class="block text-center mt-2 text-gray-400 text-sm"
            >6,789 properties</span
          >
        </section>
      </section>
    </section>
    <!-- Button -->
    <button
      class="block my-5 mx-auto py-3 px-10 text-white bg-[#6A5AF9] rounded-lg hover:text-black transition-all motion-safe:hover:scale-110 disabled:opacity-50"
      disabled
    >
      Confirm
    </button>
    <input
      type="text"
      name=""
      id=""
      class="block py-3 px-10 mt-10 mb-3 mx-auto border border-[#ccc] outline-none rounded-xl lg:focus:border-[#ffa400] transition-all"
    />
    <input
      type="checkbox"
      name=""
      id=""
      class="checked:bg-blue-600 checked:border-transparent block mx-auto appearance-none h-5 w-5 border border-amber-500"
    />
    <ul>
      <li class="odd:bg-red-500 mt-5">ABC</li>
    </ul>
    <section
      before=""
      class="flex justify-center items-center w-10 h-10 text-[#ffa400] text-xl mx-auto my-10 rounded-xl relative before:content-[''] before:absolute before:inset-0 before:rounded-xl before:bg-current before:opacity-25"
    >
      <ion-icon name="airplane-outline"></ion-icon>
    </section>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.js"
    ></script>
